services:
  - type: web
    name: telegram-weather-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /webhook
    envVars:
      - key: BOT_TOKEN
        sync: false  # секретное значение
      - key: WEATHER_API_KEY
        sync: false  # секретное значение